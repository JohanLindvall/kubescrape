apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels: {{ include "kubescrape.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}
  labels: {{ include "kubescrape.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "services", "nodes", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["replicasets", "deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  # Optional: ServiceMonitor discovery (-servicemonitors).
  - apiGroups: ["monitoring.coreos.com"]
    resources: ["servicemonitors"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}
  labels: {{ include "kubescrape.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
    {{- include "kubescrape.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.service.replicas }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Release.Name }}
      containers:
        - name: kubescrape
          image: {{ include "kubescrape.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            readOnlyRootFilesystem: true
          args:
            - -listen={{ .Values.service.listen }}
            - -self-metrics-interval={{ .Values.service.selfMetricsInterval }}
            - -wait-timeout={{ .Values.service.waitTimeout }}
            - -cache-ttl={{ .Values.service.cacheTTL }}
            - -servicemonitors={{ .Values.service.serviceMonitors }}
            {{- if .Values.service.events.enabled }}
            - -events
            {{- end }}
            {{- /* The OTLP output serves both the events exporter and the
                 service's own self-metrics push. */}}
            - -otlp-endpoint={{ .Values.service.events.otlp.endpoint }}
            - -otlp-protocol={{ .Values.service.events.otlp.protocol }}
            - -otlp-compression={{ .Values.service.events.otlp.compression }}
            - -otlp-insecure={{ .Values.service.events.otlp.insecure }}
            - -otlp-tls-insecure-skip-verify={{ .Values.service.events.otlp.tlsInsecureSkipVerify }}
            {{- with .Values.service.events.otlp.caFile }}
            - -otlp-tls-ca-file={{ . }}
            {{- end }}
            - -otlp-timeout={{ .Values.service.events.otlp.timeout }}
            {{- if .Values.service.events.otlp.bearerTokenSecret.name }}
            - -otlp-bearer-token-file=/etc/kubescrape/otlp-token/{{ .Values.service.events.otlp.bearerTokenSecret.key }}
            {{- end }}
            - -log-level={{ .Values.logLevel }}
            - -log-format={{ .Values.logFormat }}
            {{- range .Values.service.extraArgs }}
            - {{ . }}
            {{- end }}
          {{- if .Values.service.events.otlp.bearerTokenSecret.name }}
          volumeMounts:
            - name: otlp-token
              mountPath: /etc/kubescrape/otlp-token
              readOnly: true
          {{- end }}
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet: {path: /readyz, port: http}
          livenessProbe:
            httpGet: {path: /healthz, port: http}
          resources: {{ toYaml .Values.service.resources | nindent 12 }}
      {{- if and .Values.service.events.enabled .Values.service.events.otlp.bearerTokenSecret.name }}
      volumes:
        - name: otlp-token
          secret:
            secretName: {{ .Values.service.events.otlp.bearerTokenSecret.name }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels: {{ include "kubescrape.labels" . | nindent 4 }}
spec:
  selector:
    app: {{ .Release.Name }}
  ports:
    - name: http
      port: 80
      targetPort: http
{{- if .Values.service.podDisruptionBudget.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels: {{ include "kubescrape.labels" . | nindent 4 }}
spec:
  maxUnavailable: {{ .Values.service.podDisruptionBudget.maxUnavailable }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
{{- end }}

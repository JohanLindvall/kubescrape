image:
  repository: ghcr.io/johanlindvall/kubescrape
  tag: ""            # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

logLevel: info       # both components
logFormat: text

# The metadata service (Deployment).
service:
  replicas: 1
  listen: ":8080"
  # Export the service's own metrics over OTLP at this interval (0 disables);
  # uses the events otlp settings below.
  selfMetricsInterval: 1m
  waitTimeout: 5s
  cacheTTL: 5m
  # Serve targets for monitoring.coreos.com ServiceMonitors that select
  # pod-backed Services (needs the CRD installed; RBAC is always granted).
  serviceMonitors: false
  # Export Kubernetes events as OTLP log records.
  events:
    enabled: false
    otlp:
      endpoint: "otel-collector.monitoring:4317"
      protocol: grpc          # grpc | http
      compression: gzip       # gzip | none
      insecure: true
      tlsInsecureSkipVerify: false
      caFile: ""
      timeout: 15s
      bearerTokenSecret:
        name: ""
        key: token
  extraArgs: []
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
  podDisruptionBudget:
    enabled: false
    maxUnavailable: 1

# The per-node agent (DaemonSet).
agent:
  # HTTP listen address for /healthz, /readyz, /debug/tailer and /metrics
  # (Go runtime metrics only; kubescrape_* metrics are pushed over OTLP).
  listen: ":8081"
  # Export the agent's own metrics over OTLP at this interval (0 disables).
  selfMetricsInterval: 1m
  # Pipeline toggles.
  logs: true
  metrics: true
  cadvisor: true
  cadvisorRollups: true
  nodeMetrics: true

  # Read the systemd journal natively (libsystemd, via cgo). The default image
  # ships libsystemd; dir "" reads the system default (/var/log/journal is
  # mounted read-only; set dir to /run/log/journal for volatile journals).
  journald:
    enabled: false
    dir: ""
    units: []
    batchSize: 1024
    maxBatchBytes: 1048576  # flush before a batch's summed message bytes exceed this
    flushInterval: 2s
    # As logsEnrich; a level in the message wins over the journal priority.
    enrich: true
    # NOTE: journald cursor persistence requires agent.positionsFile to be set
    # (there is no standalone journald cursor file); without it, every restart
    # begins at the journal tail.

  # Receive OTLP pushed by apps on the node and enrich it with k8s attributes
  # from a container.id / k8s.pod.uid on the data before forwarding.
  ingest:
    enabled: false
    grpcEndpoint: ":4317"       # empty disables gRPC
    httpEndpoint: ":4318"       # empty disables HTTP (/v1/logs, /v1/metrics, /v1/traces)
    metricsMode: auto           # resource | datapoint | auto
    logsEnrich: true            # parse pushed log bodies (fills only unset fields)
    traces: true                # accept pushed traces, enrich resources, pass through
    # Attribute telemetry with no container id / pod uid to the pod owning the
    # connection's peer IP (opt-in; hostNetwork senders never resolve).
    peerIpFallback: false
    # Coalesce pushed payloads per signal to this many items before forwarding
    # (0 forwards each request as received). Pair with the disk buffer for
    # at-least-once delivery of coalesced batches.
    batchItems: 0
    batchTimeout: 200ms
    # Flush a coalescing batch before its encoded size would exceed this many
    # bytes (keeps merged payloads under the collector's 4 MiB gRPC recv
    # default).
    batchBytes: 3145728 # 3 MiB
    containerIdKeys: []         # default: [container.id, k8s.container.id]
    podUidKeys: []              # default: [k8s.pod.uid]

  # Kubelet scraping; empty disables cadvisor and node metrics.
  kubeletEndpoint: "https://$(NODE_IP):10250"
  kubeletInsecureTLS: true

  otlp:
    endpoint: "otel-collector.monitoring:4317"
    protocol: grpc          # grpc | http
    compression: gzip       # gzip | none
    insecure: true
    tlsInsecureSkipVerify: false
    caFile: ""
    retryAttempts: 3
    retryBackoff: 1s
    timeout: 15s
    # Bearer token from a Secret, mounted and passed via
    # -otlp-bearer-token-file.
    bearerTokenSecret:
      name: ""
      key: token

  logsExcludeNamespaces: [monitoring]
  checkpointFile: /var/lib/kubescrape-agent/checkpoints.json
  # A single file for BOTH log offsets and the journald cursor; when set it
  # overrides checkpointFile for logs, and is the only way to persist the
  # journald cursor.
  positionsFile: ""
  # Parse per-line metadata (timestamp, severity, trace/span IDs, exception
  # details) into the OTLP record fields (JohanLindvall/enrich).
  logsEnrich: true
  # Per-file line rate limit (lines/second, 0 disables). Exhausted files
  # pause (no loss, backlog stays on disk) unless logsRateDrop discards.
  logsRateLimit: 0
  logsRateBurst: 0            # 0 = 2x logsRateLimit
  logsRateDrop: false
  # Where a file with no checkpoint entry starts at agent startup: end (skip
  # as pre-existing history), start (read whole), or auto (start when the
  # checkpoint store already has entries — the file appeared while the agent
  # was down and its content is unshipped; end on a first-ever run). Note that
  # auto/start make adding a new log source ingest those files' existing
  # content.
  logsUnknownFiles: auto
  # Overlap reading with export delivery (one export in flight; at-least-once
  # semantics unchanged).
  logsPipelinedExport: false
  # Stamp log.file.name and log.file.position (byte offset) on every record,
  # for each file source.
  logsFileAttributes: false
  # Disk-backed export buffer (logs + metrics): on a collector outage records
  # spool to this directory instead of pinning the tailer to old offsets or
  # dropping metrics. Empty disables. Point it at the node-local state mount so
  # it survives pod restarts; bufferMaxBytes caps the undelivered backlog per
  # signal (the tailer back-pressures when full).
  bufferDir: ""              # e.g. /var/lib/kubescrape-agent/buffer
  bufferMaxBytes: 1073741824 # 1GiB
  # All YAML config for the agent lives in one file, rendered verbatim into a
  # mounted ConfigMap and passed via -config. Each section is optional and
  # mirrors the shape of the standalone file it replaces:
  #   resourceAttributes: defaults / static / attributes / pipelines
  #   logs:               sources (include/exclude globs, containerd vs plain,
  #                       per-source attributes / encoding / compressed)
  #   logAttributes:      rules lifting JSON/logfmt keys onto attributes
  #   logMetrics:         metrics derived from log lines (see logsMetrics below)
  #   metrics:            scraped-series pipelines filter rules and splitters
  # See docs/CONFIGURATION.md. Example:
  #   config:
  #     logs:
  #       sources:
  #         - {name: containers, include: ["/var/log/containers/*.log"], containerd: true}
  #     logAttributes:
  #       rules:
  #         - {key: tenant, attribute: tenant.id, target: resource}
  #     logMetrics:
  #       metrics:
  #         - {name: http_requests_total, type: counter, value: "1", match: ["level=error"], labels: ["status=$http_status"]}
  #     resourceAttributes:
  #       static: {cluster: prod-eu}
  config: {}
  # Runtime settings for log-derived metrics (config.logMetrics); empty uses the
  # binary defaults (interval 30s, max-bytes 3MiB, no name prefix).
  logsMetrics:
    interval: ""
    maxBytes: ""
    namePrefix: ""
  logsWatch: true
  logsPollInterval: 500ms
  logsFingerprintBytes: 1024
  multiline: true
  scrapeInterval: 30s
  scrapeExemplars: false
  # Synthetic up / scrape_duration_seconds / scrape_samples_scraped gauges
  # per target.
  scrapeHealthMetrics: true

  # Static resource attributes (key: value), e.g. cluster: prod-eu. Merged into
  # config.resourceAttributes.static via -resource-attrs-static.
  staticAttrs: {}

  extraArgs: []
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi

networkPolicy:
  enabled: false

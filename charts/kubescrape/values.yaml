image:
  repository: ghcr.io/johanlindvall/kubescrape
  tag: ""            # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

logLevel: info       # both components
logFormat: text

# The metadata service (Deployment).
service:
  replicas: 1
  listen: ":8080"
  waitTimeout: 5s
  cacheTTL: 5m
  # Serve targets for monitoring.coreos.com ServiceMonitors that select
  # pod-backed Services (needs the CRD installed; RBAC is always granted).
  serviceMonitors: false
  # Export Kubernetes events as OTLP log records.
  events:
    enabled: false
    otlp:
      endpoint: "otel-collector.monitoring:4317"
      protocol: grpc          # grpc | http
      insecure: true
      tlsInsecureSkipVerify: false
      caFile: ""
      timeout: 15s
      bearerTokenSecret:
        name: ""
        key: token
  extraArgs: []
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
  podDisruptionBudget:
    enabled: false
    maxUnavailable: 1

# The per-node agent (DaemonSet).
agent:
  # HTTP listen address for /healthz, /readyz and /metrics (self-metrics).
  listen: ":8081"
  # Pipeline toggles.
  logs: true
  metrics: true
  cadvisor: true
  cadvisorRollups: true
  nodeMetrics: true

  # Tail the systemd journal via journalctl. The default distroless image
  # does NOT contain journalctl; set image.repository/tag to an image that
  # provides it. dir "" reads the system default (/var/log/journal is
  # mounted read-only; set dir to /run/log/journal for volatile journals).
  journald:
    enabled: false
    path: journalctl
    dir: ""
    units: []
    cursorFile: /var/lib/kubescrape-agent/journal.cursor
    batchSize: 1024
    flushInterval: 2s
    # As logsEnrich; a level in the message wins over the journal priority.
    enrich: true

  # Receive OTLP pushed by apps on the node and enrich it with k8s attributes
  # from a container.id / k8s.pod.uid on the data before forwarding.
  ingest:
    enabled: false
    grpcEndpoint: ":4317"       # empty disables gRPC
    httpEndpoint: ":4318"       # empty disables HTTP (/v1/logs, /v1/metrics)
    metricsMode: auto           # resource | datapoint | auto
    logsEnrich: true            # parse pushed log bodies (fills only unset fields)
    containerIdKeys: []         # default: [container.id, k8s.container.id]
    podUidKeys: []              # default: [k8s.pod.uid]

  # Kubelet scraping; empty disables cadvisor and node metrics.
  kubeletEndpoint: "https://$(NODE_IP):10250"
  kubeletInsecureTLS: true

  otlp:
    endpoint: "otel-collector.monitoring:4317"
    protocol: grpc          # grpc | http
    insecure: true
    tlsInsecureSkipVerify: false
    caFile: ""
    retryAttempts: 3
    retryBackoff: 1s
    timeout: 15s
    # Bearer token from a Secret, mounted and passed via
    # -otlp-bearer-token-file.
    bearerTokenSecret:
      name: ""
      key: token

  logsExcludeNamespaces: [monitoring]
  checkpointFile: /var/lib/kubescrape-agent/checkpoints.json
  # A single file for BOTH log offsets and the journald cursor; when set it
  # overrides checkpointFile and journald.cursorFile.
  positionsFile: ""
  # Parse per-line metadata (timestamp, severity, trace/span IDs, exception
  # details) into the OTLP record fields (JohanLindvall/enrich).
  logsEnrich: true
  # Lift configured JSON/logfmt keys from the log line onto resource/scope/log
  # attributes; rendered verbatim into a mounted config (applies to logs and
  # journald). See the README.
  #   rules:
  #     - {key: tenant, attribute: tenant.id, target: resource}
  #     - {key: http.status_code, target: log}
  logAttributesConfig: {}
  logsWatch: true
  logsPollInterval: 500ms
  logsFingerprintBytes: 1024
  multiline: true
  scrapeInterval: 30s
  scrapeExemplars: false
  # Synthetic up / scrape_duration_seconds / scrape_samples_scraped gauges
  # per target.
  scrapeHealthMetrics: true

  # Static resource attributes (key: value), e.g. cluster: prod-eu.
  staticAttrs: {}
  # Rendered verbatim into the -resource-attrs-config file. See the README
  # (defaults / static / attributes / pipelines).
  attrsConfig: {}
  # Rendered verbatim into the -metrics-config file (pipelines filter rules
  # and splitters).
  metricsConfig: {}

  extraArgs: []
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi

networkPolicy:
  enabled: false

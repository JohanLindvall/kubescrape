# kubescrape-agent: per-node DaemonSet tailing containerd logs and scraping
# Prometheus targets (including the kubelet's cadvisor endpoint), exporting
# OTLP to an OpenTelemetry collector. Pod metadata comes from the kubescrape
# metadata service; the ServiceAccount exists solely to authenticate to the
# kubelet for cadvisor (nodes/metrics).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubescrape-agent
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubescrape-agent
rules:
  - apiGroups: [""]
    resources: ["nodes/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubescrape-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubescrape-agent
subjects:
  - kind: ServiceAccount
    name: kubescrape-agent
    namespace: monitoring
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kubescrape-agent
  namespace: monitoring
  labels:
    app: kubescrape-agent
spec:
  selector:
    matchLabels:
      app: kubescrape-agent
  template:
    metadata:
      labels:
        app: kubescrape-agent
    spec:
      serviceAccountName: kubescrape-agent
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: agent
          image: ghcr.io/johanlindvall/kubescrape:latest
          imagePullPolicy: IfNotPresent
          command: ["/kubescrape-agent"]
          args:
            - -metadata-endpoint=http://kubescrape.monitoring
            - -otlp-endpoint=otel-collector.monitoring:4317
            - -positions-file=/var/lib/kubescrape-agent/positions.json
            - -scrape-interval=30s
            # Do not tail the collector's own output (feedback loop).
            - -logs-exclude-namespaces=monitoring
            # Enables the cadvisor and node-metrics scrapes; disable
            # individual pipelines with -logs=false, -metrics=false,
            # -cadvisor=false or -node-metrics=false.
            - -kubelet-endpoint=https://$(NODE_IP):10250
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          securityContext:
            # Container log files under /var/log/pods are root-readable only.
            runAsUser: 0
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: state
              mountPath: /var/lib/kubescrape-agent
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: state
          hostPath:
            path: /var/lib/kubescrape-agent
            type: DirectoryOrCreate

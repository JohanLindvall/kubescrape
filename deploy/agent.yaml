# kubescrape-agent: per-node DaemonSet tailing containerd logs and scraping
# Prometheus targets, exporting OTLP to an OpenTelemetry collector. It talks
# only to the kubescrape metadata service and the collector — no Kubernetes
# API access, so no RBAC is needed.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kubescrape-agent
  namespace: monitoring
  labels:
    app: kubescrape-agent
spec:
  selector:
    matchLabels:
      app: kubescrape-agent
  template:
    metadata:
      labels:
        app: kubescrape-agent
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: agent
          image: ghcr.io/johanlindvall/kubescrape:latest
          imagePullPolicy: IfNotPresent
          command: ["/kubescrape-agent"]
          args:
            - -metadata-endpoint=http://kubescrape.monitoring
            - -otlp-endpoint=otel-collector.monitoring:4317
            - -checkpoint-file=/var/lib/kubescrape-agent/checkpoints.json
            - -scrape-interval=30s
            # Do not tail the collector's own output (feedback loop).
            - -logs-exclude-namespaces=monitoring
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            # Container log files under /var/log/pods are root-readable only.
            runAsUser: 0
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: state
              mountPath: /var/lib/kubescrape-agent
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: state
          hostPath:
            path: /var/lib/kubescrape-agent
            type: DirectoryOrCreate
